version: "3.9"

# ============================================================
# Personal Library — Docker Compose
# ============================================================
# Sobe três serviços:
#   1. mongodb   — banco de dados NoSQL
#   2. app       — aplicação Spring Boot
#   3. sonarqube — análise de qualidade de código
#
# Como usar:
#   Subir tudo:         docker-compose up -d
#   Ver logs:           docker-compose logs -f app
#   Parar tudo:         docker-compose down
#   Parar e remover db: docker-compose down -v
# ============================================================

services:

  # ============================================================
  # 1. MongoDB — Banco de Dados
  # ============================================================
  mongodb:
    image: mongo:6.0
    container_name: library-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: librarydb
    ports:
      - "27017:27017"         # Expõe para ferramentas externas (ex: MongoDB Compass)
    volumes:
      - mongodb_data:/data/db # Persiste dados entre reinicializações
    networks:
      - library-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================================
  # 2. Aplicação Spring Boot
  # ============================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: library-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Conecta ao serviço mongodb (nome do serviço = hostname no Docker)
      SPRING_DATA_MONGODB_URI: mongodb://admin:password@mongodb:27017/librarydb?authSource=admin
      SPRING_DATA_MONGODB_DATABASE: librarydb
      SPRING_THYMELEAF_CACHE: "false"
    depends_on:
      mongodb:
        condition: service_healthy   # Aguarda MongoDB estar saudável antes de iniciar
    networks:
      - library-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ============================================================
  # 3. SonarQube — Análise de Qualidade de Código
  # ============================================================
  # Acesso: http://localhost:9000
  # Login padrão: admin / admin (troca na primeira vez)
  # ============================================================
  sonarqube:
    image: sonarqube:10.4-community
    container_name: library-sonarqube
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-postgres:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    depends_on:
      - sonar-postgres
    networks:
      - library-network
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  # Banco de dados do SonarQube (PostgreSQL)
  sonar-postgres:
    image: postgres:15
    container_name: library-sonar-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonar_postgres_data:/var/lib/postgresql/data
    networks:
      - library-network

# ============================================================
# Volumes persistentes (dados sobrevivem a docker-compose down)
# ============================================================
volumes:
  mongodb_data:
    driver: local
  sonarqube_data:
    driver: local
  sonarqube_extensions:
    driver: local
  sonarqube_logs:
    driver: local
  sonar_postgres_data:
    driver: local

# ============================================================
# Rede interna (os serviços se comunicam pelo nome do serviço)
# ============================================================
networks:
  library-network:
    driver: bridge