<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Minha Biblioteca</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon">📚</span>
            <h1>Criar Conta</h1>
            <p>Cadastre-se para gerenciar sua biblioteca</p>
        </div>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/register}" method="post" th:object="${user}" class="auth-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label for="name">Nome Completo</label>
                <input type="text" id="name" th:field="*{name}"
                       placeholder="Seu nome completo">
                <span class="field-error" th:if="${#fields.hasErrors('name')}"
                      th:errors="*{name}"></span>
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" th:field="*{username}"
                       placeholder="Ex: joaosilva (3 a 20 caracteres)">
                <span class="field-error" th:if="${#fields.hasErrors('username')}"
                      th:errors="*{username}"></span>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" th:field="*{email}"
                       placeholder="seu@email.com">
                <span class="field-error" th:if="${#fields.hasErrors('email')}"
                      th:errors="*{email}"></span>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" th:field="*{password}"
                       placeholder="Mínimo 6 caracteres">
                <span class="field-error" th:if="${#fields.hasErrors('password')}"
                      th:errors="*{password}"></span>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmar Senha</label>
                <input type="password" id="confirmPassword" th:field="*{confirmPassword}"
                       placeholder="Repita a senha">
                <span class="field-error" th:if="${#fields.hasErrors('confirmPassword')}"
                      th:errors="*{confirmPassword}"></span>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Criar Conta</button>
        </form>

        <div class="auth-footer">
            <p>Já tem conta? <a th:href="@{/login}">Faça login</a></p>
        </div>
    </div>
</div>

</body>
</html>
