# ============================
# Personal Library - Configurações
# ============================

# Porta do servidor
server.port=8080

# Nome da aplicação
spring.application.name=personal-library

# ============================
# MongoDB
# ============================
# URI padrão para desenvolvimento local — sobrescrita pela variável SPRING_DATA_MONGODB_URI em produção/Docker
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/librarydb}
spring.data.mongodb.database=librarydb

# ============================
# Thymeleaf (Templates HTML)
# ============================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ============================
# Logs
# ============================
logging.level.com.library=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.data.mongodb=INFO

# ============================
# Sessão HTTP
# ============================
# Tempo de inatividade antes do logout automático (em segundos)
server.servlet.session.timeout=1800