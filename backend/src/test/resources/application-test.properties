# ============================
# Configurações para Testes
# ============================
# O MongoDB URI é sobrescrito pelo Testcontainers em tempo de execução.
# Esta propriedade é um placeholder — o container real é iniciado pelo @DynamicPropertySource.
spring.data.mongodb.uri=mongodb://localhost:27017/librarydb-test

# Desabilita cache de templates em testes (facilita debug)
spring.thymeleaf.cache=false

# Logs mais detalhados em testes para diagnóstico
logging.level.com.library=DEBUG
logging.level.org.testcontainers=INFO