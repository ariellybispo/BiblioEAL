<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null ? pageTitle + ' | ' : ''} + 'Minha Biblioteca'">Minha Biblioteca</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar" sec:authorize="isAuthenticated()">
    <div class="navbar-brand">
        <span class="brand-icon">📚</span>
        <span class="brand-text">Minha Biblioteca</span>
    </div>
    <div class="navbar-menu">
        <a th:href="@{/books}" class="nav-link">Meus Livros</a>
        <a th:href="@{/books/new}" class="nav-link">+ Adicionar</a>
    </div>
    <div class="navbar-user">
        <span class="user-greeting">Olá, <strong th:text="${username != null ? username : #authentication.name}">Usuário</strong></span>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn-logout">Sair</button>
        </form>
    </div>
</nav>

<!-- Conteúdo Principal -->
<main class="main-content">
    <!-- Mensagens de sucesso/erro globais -->
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div th:if="${message}" class="alert alert-info" th:text="${message}"></div>

    <!-- Slot de conteúdo — cada página preenche aqui -->
    <th:block th:replace="${content}"></th:block>
</main>

<footer class="footer">
    <p>Personal Library Manager &copy; 2025 — Projeto QA</p>
</footer>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
