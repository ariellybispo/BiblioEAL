<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Minha Biblioteca</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon">📚</span>
            <h1>Minha Biblioteca</h1>
            <p>Faça login para acessar sua coleção</p>
        </div>

        <!-- Mensagens -->
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${message}" class="alert alert-info" th:text="${message}"></div>

        <!-- Formulário de Login -->
        <!-- O Spring Security intercepta o POST /login automaticamente -->
        <form th:action="@{/login}" method="post" class="auth-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" name="username"
                       placeholder="Seu username" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password"
                       placeholder="Sua senha" required>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Entrar</button>
        </form>

        <div class="auth-footer">
            <p>Não tem conta? <a th:href="@{/register}">Cadastre-se aqui</a></p>
        </div>
    </div>
</div>

</body>
</html>
