<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${action} + ' Livro | Minha Biblioteca'">Livro | Minha Biblioteca</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="navbar-brand">
        <span class="brand-icon">📚</span>
        <span class="brand-text">Minha Biblioteca</span>
    </div>
    <div class="navbar-menu">
        <a th:href="@{/books}" class="nav-link">Meus Livros</a>
        <a th:href="@{/books/new}" class="nav-link nav-link-add">+ Adicionar</a>
    </div>
    <div class="navbar-user">
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn-logout">Sair</button>
        </form>
    </div>
</nav>

<main class="main-content">
    <div class="form-page">
        <div class="form-header">
            <a th:href="@{/books}" class="back-link">← Voltar</a>
            <h2 th:text="${action} + ' Livro'">Cadastrar Livro</h2>
        </div>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <!--
            Para edição: action="/books/{id}"
            Para criação: action="/books"
            Os HTML forms só suportam GET/POST, então usamos POST para ambos.
        -->
        <form th:action="${book.id != null ? '/books/' + book.id : '/books'}"
              method="post"
              th:object="${book}"
              class="book-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-row">
                <div class="form-group">
                    <label for="title">Título *</label>
                    <input type="text" id="title" th:field="*{title}"
                           placeholder="Ex: O Senhor dos Anéis">
                    <span class="field-error" th:if="${#fields.hasErrors('title')}"
                          th:errors="*{title}"></span>
                </div>

                <div class="form-group">
                    <label for="author">Autor *</label>
                    <input type="text" id="author" th:field="*{author}"
                           placeholder="Ex: J.R.R. Tolkien">
                    <span class="field-error" th:if="${#fields.hasErrors('author')}"
                          th:errors="*{author}"></span>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="isbn">ISBN *</label>
                    <input type="text" id="isbn" th:field="*{isbn}"
                           placeholder="Ex: 978-3-16-148410-0">
                    <span class="field-error" th:if="${#fields.hasErrors('isbn')}"
                          th:errors="*{isbn}"></span>
                </div>

                <div class="form-group">
                    <label for="year">Ano de Publicação</label>
                    <input type="number" id="year" th:field="*{year}"
                           placeholder="Ex: 1954" min="1000" max="2100">
                    <span class="field-error" th:if="${#fields.hasErrors('year')}"
                          th:errors="*{year}"></span>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="genre">Gênero</label>
                    <input type="text" id="genre" th:field="*{genre}"
                           placeholder="Ex: Fantasia, Romance, Ficção Científica">
                </div>

                <div class="form-group">
                    <label for="status">Status de Leitura</label>
                    <select id="status" th:field="*{status}">
                        <option th:each="s : ${statuses}"
                                th:value="${s}"
                                th:text="${s.label}"></option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="description">Descrição / Notas Pessoais</label>
                <textarea id="description" th:field="*{description}"
                          rows="4"
                          placeholder="Suas impressões sobre o livro, resumo, citações favoritas..."></textarea>
            </div>

            <div class="form-actions">
                <a th:href="@{/books}" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary" th:text="${action} + ' Livro'">
                    Salvar
                </button>
            </div>
        </form>
    </div>
</main>

<footer class="footer">
    <p>Personal Library Manager &copy; 2025 — Projeto QA</p>
</footer>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
