name: CI — BiblioEAL

# Dispara em push e pull request nas branches principais
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ============================================================
  # JOB 1: Build, Testes e Cobertura
  # ============================================================
  build-and-test:
    name: Build, Testes & Cobertura JaCoCo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Executa todos os testes + gera relatório JaCoCo
      # Testcontainers usa Docker do runner (disponível no ubuntu-latest)
      # WireMock roda in-process (sem Docker extra)
      - name: Executar testes com cobertura (mvn verify)
        working-directory: backend
        run: mvn verify -B --no-transfer-progress

      - name: Upload do relatório JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
          retention-days: 30

      # ── SonarQube ──────────────────────────────────────────
      # Executa apenas se o secret SONAR_TOKEN estiver configurado.
      # Configure em: Settings > Secrets > SONAR_TOKEN e SONAR_HOST_URL
      - name: Análise SonarQube
        working-directory: backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          if [ -n "${SONAR_TOKEN}" ]; then
            echo "Iniciando análise SonarQube..."
            mvn sonar:sonar \
              -Dsonar.projectKey=personal-library \
              -Dsonar.host.url=${SONAR_HOST_URL} \
              -Dsonar.token=${SONAR_TOKEN} \
              -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
              -B --no-transfer-progress
          else
            echo "⚠️  SONAR_TOKEN não configurado — análise SonarQube ignorada."
            echo "Configure os secrets SONAR_TOKEN e SONAR_HOST_URL para habilitar."
          fi

  # ============================================================
  # JOB 2: Docker Build (verifica que a imagem é válida)
  # ============================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build da imagem Docker
        run: docker build -t biblioeal:${{ github.sha }} .

      - name: Smoke test — verifica que o container inicia
        run: |
          docker run -d \
            --name smoketest \
            -e SPRING_DATA_MONGODB_URI=mongodb://localhost:27017/test \
            biblioeal:${{ github.sha }} || true
          sleep 5
          docker logs smoketest || true
          docker rm -f smoketest || true
